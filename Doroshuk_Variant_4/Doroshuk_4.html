<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Дорошук Артем, варіант №4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/modern-normalize.css" />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body class="variant-page">
    <header class="variant-header">
      <a href="../index.html">Повернутися на головну</a>
    </header>

    <main class="variant-main">
      <h1 class="variant-title">Варіант № 4</h1>

      <table class="layout-table">
        <colgroup>
          <col class="variant-col-small" />
          <col class="variant-col-small" />
          <col class="variant-col-small" />
          <col class="variant-col-medium" />
          <col class="variant-col-narrow" />
          <col class="variant-col-wide" />
        </colgroup>

        <tr class="variant-row-large">
          <td class="search-cell" colspan="3">
            <form class="search-form" action="#" method="get">
              <label class="visually-hidden" for="site-search">
                Пошук по сайту
              </label>
              <input
                type="search"
                id="site-search"
                name="site_search"
                placeholder="Пошук по сайту"
              />
              <button type="submit">Знайти</button>
            </form>
          </td>

          <td class="list-cell" rowspan="2">
            <ul class="custom-list">
              <li class="disc-item">Реклама</li>
              <li class="circle-item">Медіа</li>
              <li class="square-item">
                <em>Бізнес</em>
              </li>
            </ul>
          </td>

          <td class="text-cell blue-cell">Синій</td>
          <td></td>
        </tr>

        <tr class="variant-row-small">
          <td class="link-cell">
            <a
              href="https://www.google.com"
              target="_blank"
              rel="noopener noreferrer"
            >
              Гіперпосилання 1
            </a>
          </td>

          <td class="link-cell">
            <a
              href="https://www.wikipedia.org"
              target="_blank"
              rel="noopener noreferrer"
            >
              Гіперпосилання 2
            </a>
          </td>

          <td class="link-cell">
            <a
              href="https://www.w3.org"
              target="_blank"
              rel="noopener noreferrer"
            >
              Гіперпосилання 3
            </a>
          </td>

          <td class="text-cell pink-cell" colspan="2">Рожевий</td>
        </tr>

        <tr class="variant-row-medium">
          <td class="text-cell red-cell">Червоний</td>
          <td colspan="2"></td>
          <td class="background-cell" rowspan="4">Фоновий<br />рисунок</td>
          <td class="text-cell yellow-cell">Жовтий</td>
          <td></td>
        </tr>

        <tr class="variant-row-default">
          <td class="pictures-area" colspan="3" rowspan="3">
            <table class="inner-pictures-table">
              <tr>
                <td>
                  <div class="picture-box">
                    <img
                      src="./images/picture-1.png"
                      alt="Рисунок 1: реклама"
                      width="112"
                    />
                  </div>
                </td>

                <td>
                  <div class="picture-box">
                    <img
                      src="./images/picture-2.png"
                      alt="Рисунок 2: медіа"
                      width="112"
                    />
                  </div>
                </td>

                <td>
                  <div class="picture-box">
                    <img
                      src="./images/picture-3.png"
                      alt="Рисунок 3: бізнес"
                      width="112"
                    />
                  </div>
                </td>
              </tr>

              <tr>
                <td>
                  <div class="picture-box">
                    <img
                      src="./images/picture-1.png"
                      alt="Повторний рисунок 1: реклама"
                      width="112"
                    />
                  </div>
                </td>

                <td class="student-cell">
                  <span class="student-main">Я</span>
                  <span class="student-word">студент</span>
                  <span class="student-university">ХНЕУ</span>
                </td>

                <td>
                  <div class="picture-box">
                    <img
                      src="./images/picture-1.png"
                      alt="Повторний рисунок 1: реклама"
                      width="112"
                    />
                  </div>
                </td>
              </tr>
            </table>
          </td>

          <td></td>

          <td class="numbered-list-cell" rowspan="3">
            <ol start="21">
              <li>
                <strong>Реклама</strong>
              </li>
              <li>Медіа</li>
              <li>
                <strong>
                  <em>Бізнес</em>
                </strong>
              </li>
            </ol>
          </td>
        </tr>

        <tr class="variant-row-default">
          <td class="copyright-cell">&copy; 2024</td>
        </tr>

        <tr class="variant-row-default">
          <td></td>
        </tr>
      </table>
    </main>
  </body>
</html>
